# SwiftLint configuration for Gym Buddy.
# Goal: zero violations. Every rule that isn't reasonable for our codebase is
# explicitly disabled with a reason. Do not add a `disabled_rules:` entry
# without a one-line justification.

included:
  - GymBuddy/Sources
  - GymBuddy/App
  - GymBuddy/Tests

excluded:
  - GymBuddy/.build
  - GymBuddy/.swiftpm

disabled_rules:
  - trailing_whitespace          # Enforced by SwiftFormat pre-commit hook.
  - line_length                  # Enforced by SwiftFormat (column 120).
  - todo                         # We allow `TODO:` only with a tracking issue — enforced via custom rule below.
  - identifier_name              # We use x/y for keypoints, s/m/l/xl for design tokens — both are intentional and improve readability.
  - type_name                    # `DS` is the design-system namespace; deliberately short.
  - nesting                      # `PlanGenerator.Inputs.Goal` is the right shape for a domain-restricted enum.
  - orphaned_doc_comment         # File-level `///` headers documenting a section are normal Swift convention.
  - large_tuple                  # We use 3-tuples for synthetic-pose buffer rows — replacing with structs would add ceremony for no clarity gain.

opt_in_rules:
  - empty_count
  - explicit_init
  - force_unwrapping
  - implicit_return
  - redundant_nil_coalescing
  - toggle_bool
  # Note: sorted_imports omitted — the 90+ violations across the repo are pure
  # style and not worth the churn. Readability of `import` blocks is fine.

force_unwrapping:
  severity: error                # Zero force unwraps in production code. PRD §14.

# Body / complexity limits — relaxed because:
#  - View models legitimately reach >250 lines when they own a mix of state,
#    intent handling, and lifecycle. Splitting them across files just to
#    placate a line-count rule is busywork.
#  - The cue-display switch has one short case per CueType (~20 cases). That
#    blows past the cyclomatic-complexity-of-10 default but is the simplest
#    possible mapping — refactoring it just adds indirection.
type_body_length:
  warning: 400
  error: 500
function_body_length:
  warning: 80
  error: 120
cyclomatic_complexity:
  warning: 25
  error: 30

force_cast:
  severity: error

custom_rules:
  no_tracked_todo:
    included: ".*\\.swift"
    regex: "// ?TODO(?!:? [A-Z]+-\\d+)"
    message: "TODO requires a tracker link, e.g. // TODO: GB-123 — fix X."
    severity: warning

reporter: "xcode"
